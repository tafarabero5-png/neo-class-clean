
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Class Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #1a3a52;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #5568d3 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            position: relative;
            color: transparent;
        }

        .loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Class Report Generator</h1>
        <p class="subtitle">Generate PDF reports for all students in a class</p>

        <form id="reportForm">
            <div class="form-group">
                <label for="classSelect">Select Class:</label>
                <select id="classSelect" required>
                    <option value="">-- Select a class --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="termSelect">Select Term:</label>
                <select id="termSelect" required>
                    <option value="">-- Select a term --</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">📄 Generate PDF Reports</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadClasses();
            loadTerms();
            document.getElementById('reportForm').addEventListener('submit', handleSubmit);
        });

        // Load classes
        function loadClasses() {
            fetch('/classes')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('classSelect');
                        data.classes.forEach(cls => {
                            const option = document.createElement('option');
                            option.value = cls.id;
                            option.textContent = cls.name;
                            select.appendChild(option);
                        });
                    }
                })
                .catch(err => showMessage('Error loading classes', 'error'));
        }

        // Load terms
        function loadTerms() {
            fetch('/terms')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('termSelect');
                        data.terms.forEach(term => {
                            const option = document.createElement('option');
                            option.value = term;
                            option.textContent = term;
                            select.appendChild(option);
                        });
                    }
                })
                .catch(err => showMessage('Error loading terms', 'error'));
        }

        // Handle form submission
        function handleSubmit(e) {
            e.preventDefault();

            const classId = document.getElementById('classSelect').value;
            const term = document.getElementById('termSelect').value;
            const btn = document.getElementById('submitBtn');

            if (!classId) {
                showMessage('Please select a class', 'error');
                return;
            }

            if (!term) {
                showMessage('Please select a term', 'error');
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');

            fetch('/generate-class-reports', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    class_id: parseInt(classId),
                    term: term
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.classList.remove('loading');

                if (data.success) {
                    showMessage(`✓ ${data.message}. Downloading...`, 'success');
                    setTimeout(() => {
                        window.location.href = data.download;
                    }, 500);
                } else {
                    showMessage(`✗ ${data.message}`, 'error');
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.classList.remove('loading');
                showMessage('Error: ' + err.message, 'error');
            });
        }

        // Show message
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type} show`;

            setTimeout(() => {
                msgDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
