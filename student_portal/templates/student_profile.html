<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='results_design.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="{{ url_for('static', filename='funda.png') }}" alt="Logo">
                <span>First Class High School</span>
            </div>
            <div class="nav-menu">
                <a href="/student_portal" class="nav-link">
                    <i class="fas fa-chart-bar"></i> Results
                </a>
                <a href="/student_profile" class="nav-link active">
                    <i class="fas fa-user-circle"></i> Profile
                </a>
                <a href="/logout" class="nav-link logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="header-section">
            <h1><i class="fas fa-user-circle"></i> Student Profile</h1>
        </div>

        <div class="container">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2>{{ student.firstname }} {{ student.surname }}</h2>
                        <p>Student ID: <strong>{{ student.id }}</strong></p>
                        <p>Class: <strong>{{ student.class_name }}</strong></p>
                    </div>
                </div>

                <div class="profile-details">
                    <div class="detail-item">
                        <label><i class="fas fa-id-card"></i> Full Name</label>
                        <p>{{ student.firstname }} {{ student.surname }}</p>
                    </div>
                    <div class="detail-item">
                        <label><i class="fas fa-barcode"></i> Student ID</label>
                        <p>{{ student.id }}</p>
                    </div>
                    <div class="detail-item">
                        <label><i class="fas fa-book"></i> Class</label>
                        <p>{{ student.class_name }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .profile-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .profile-info p {
            color: var(--gray);
            margin: 5px 0;
        }

        .profile-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .detail-item {
            padding: 20px;
            background: #f5f7fa;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .detail-item label {
            color: var(--primary);
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }

        .detail-item label i {
            margin-right: 8px;
        }

        .detail-item p {
            color: var(--dark);
            font-size: 16px;
        }
    </style>
</body>
</html>
